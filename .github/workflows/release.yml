name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp, pyinstaller & ffmpeg
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp pyinstaller
          choco install ffmpeg -y

      - name: Build extension XPI
        shell: bash
        run: bash scripts/build.sh

      - name: Build native host EXE
        shell: bash
        run: |
          cd native_host
          python -m PyInstaller --onefile --name host --distpath . host.py
          ls -la host.exe

      - name: Package full installer bundle (extension + native host + installer)
        shell: bash
        run: |
          set -e
          PKG="yt-dlp-downloader-windows"
          rm -rf "$PKG"
          mkdir -p "$PKG/native_host" "$PKG/scripts"
          # Extension
          cp dist/yt-dlp-downloader.xpi "$PKG/"
          # Native host (exe + python source + manifest + bat fallback)
          cp native_host/host.exe "$PKG/native_host/"
          cp native_host/host.py "$PKG/native_host/"
          cp native_host/host.bat "$PKG/native_host/" 2>/dev/null || true
          cp native_host/com.kajusmar.ytdlp_downloader.json "$PKG/native_host/"
          # Installer + uninstaller
          cp scripts/install_windows.bat "$PKG/scripts/"
          cp scripts/uninstall_windows.bat "$PKG/scripts/" 2>/dev/null || true
          cp README.md "$PKG/" 2>/dev/null || true
          cp INSTALL.md "$PKG/" 2>/dev/null || true
          # Zip it (PowerShell Compress-Archive is fine for a plain zip, not an xpi)
          powershell -NoProfile -Command "Compress-Archive -Path '$PKG/*' -DestinationPath '$PKG.zip' -Force"
          ls -la "$PKG.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/yt-dlp-downloader.xpi
            native_host/host.exe
            yt-dlp-downloader-windows.zip
          generate_release_notes: true
          draft: false
          prerelease: false
