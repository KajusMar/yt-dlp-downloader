<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yt-dlp Downloader - Options</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #14161a; color: #e8e8e8; margin: 0; padding: 24px; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: #888; font-size: 13px; margin-bottom: 20px; }
    .row { margin-bottom: 18px; max-width: 520px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type="text"] { width: 100%; padding: 8px 10px; background: #1f2228; border: 1px solid #333; border-radius: 6px; color: #e8e8e8; font-size: 13px; box-sizing: border-box; }
    .hint { color: #777; font-size: 12px; margin-top: 4px; }
    button { background: #ff4444; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
    button:hover { background: #ff5e5e; }
    .saved { color: #00ff88; font-size: 12px; margin-left: 10px; opacity: 0; transition: opacity .2s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>yt-dlp Video Downloader</h1>
  <div class="sub">Settings are stored locally in your browser.</div>

  <div class="row">
    <label for="downloadDir">Default download directory</label>
    <input type="text" id="downloadDir" placeholder="C:\Users\YourName\Videos\yt-dlp">
    <div class="hint">Used by the native host when saving downloads. Leave blank to use the default (%USERPROFILE%/Videos/yt-dlp).</div>
  </div>

  <div class="row">
    <label for="defaultFormat">Default format</label>
    <select id="defaultFormat" style="width:100%;padding:8px 10px;background:#1f2228;border:1px solid #333;border-radius:6px;color:#e8e8e8;font-size:13px;">
      <option value="best">Best quality (up to 1080p)</option>
      <option value="bestvideo+bestaudio/best">Best available (any quality)</option>
      <option value="720p">720p</option>
      <option value="480p">480p</option>
      <option value="audio">Audio only (MP3)</option>
    </select>
  </div>

  <button id="saveBtn">Save</button>
  <span class="saved" id="savedMsg">Saved ✓</span>

  <script src="options.js"></script>
</body>
</html>
